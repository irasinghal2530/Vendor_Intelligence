version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    # LLM: backend uses Ollama (see OLLAMA_MODEL / OLLAMA_BASE_URL in .env).
    # If the backend runs in Docker but Ollama runs on the host, set
    # OLLAMA_BASE_URL=http://host.docker.internal:11434 (Docker Desktop) or the host gateway on Linux.
    restart: unless-stopped
    
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Frontend needs to know where the backend is hosted
      # Here we reference the 'backend' service name directly
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
