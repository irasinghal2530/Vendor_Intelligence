version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Frontend needs to know where the backend is hosted
      # Here we reference the 'backend' service name directly
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
